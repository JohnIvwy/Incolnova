<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Incolnova - Home</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/fonts/fonts.css">
    <link rel="icon" href="/assets/img/icon.png" type="image/png">
    <script src="/js/modal.js"></script>
</head>
<body>
    
    <!-- HEADER -->
    <header>
        <div class="header__title">
            <h1>INCOLNOVA S.A.S</h1>
        </div>
        <div class="main-nav">
            <nav class="navbar">
                <ul class="navbar__ul">
                    <li><a href="">HOME</a></li>
                    <li><a href="">STOCK</a></li>
                </ul>
            </nav>
            <div class="div-searcher">
                <input type="text" name="filter" id="navbar__filter" placeholder="Search product, client, category">
                <button><img src="/assets/img/search_icon.svg" alt="search icon"></button>
            </div>
        </div>
    </header>


    <!-- CONTENIDO PRINCIPAL -->
    <main class="dashboard">

        <!-- LISTADO IZQUIERDA -->
            <section class="products">
                <article class="card" data-id="123">
                    <section class="card-body">
                        <dl>
                            <div><dt>Client:</dt><dd>John Smith</dd></div>
                            <div><dt>Product:</dt><dd>Shirt</dd></div>
                            <div><dt>Color:</dt><dd>Black</dd></div>
                            <div><dt>Quantity:</dt><dd>10</dd></div>
                            <div><dt>Unit Price:</dt><dd>$30.000</dd></div>
                            <div><dt>Total Price:</dt><dd>null</dd></div>
                        </dl>
                    </section>
                    <div class="card-actions">
                        <button type="button" class="btn-edit">Edit</button>
                        <button type="button" class="btn-delete">Delete</button>
                    </div>
                </article>
            </section>


        <!-- PANEL DERECHO (FILTROS) -->
        <aside class="aside">
            <div class="aside-top">
                <section class="sec__aside filters">
                    <h2>Filter by:</h2>
                    
                    <form action="">
                        <div class="form-group">
                            <label>Category:
                                <select id="product" required>
                                    <option value="" disabled selected></option>
                                    <option value="1">Shirt</option>
                                    <option value="2">Jersey</option>
                                    <option value="3">Coat</option>
                                    <option value="4">Jacket</option>
                                    <option value="5">Pants</option>
                                </select>
                            </label>
                        </div>
        
                        <div class="form-group">
                            <label>Size:
                                <input type="number">
                            </label>
                        </div>
        
                        <div class="form-group">
                            <label>Color:
                                <input type="text">
                            </label>
                        </div>
                        <div class="div-filter"><button type="submit" class="btn-filter">Filter</button></div>
                    </form>
                </section>

                <button id="openBtn" class="btn-open-modal">Add Register</button>
            </div>

            <dialog id="miModal" class="modal">
                <header class="header-modal">
                    <h2>New Register</h2>
                    <button id="closeBtn" class="close-modal" aria-label="Cerrar">&times;</button>
                </header>

                <form method="dialog" id="formRegister">
                    <div class="inputs-modal">
                        
                        <label for="client">Client:</label>
                        <input id="client" type="text" placeholder="John Doe" required>

                        <label for="product">Select the product:</label>
                        <select id="product" required>
                            <option value="" disabled selected>Select product</option>
                            <option value="1">Shirt</option>
                            <option value="2">Jersey</option>
                            <option value="3">Coat</option>
                            <option value="4">Jacket</option>
                            <option value="5">Pants</option>
                        </select>

                        <label for="branch">Select the branch:</label>
                        <select id="branch" required>
                            <option value="" disabled selected>Select branch</option>
                            <option>Adidas</option>
                            <option>Arturo Calle</option>
                            <option>Lacoste</option>
                            <option>H&M</option>
                        </select>

                        <label for="color">Select the color:</label>
                        <select id="color" required>
                            <option value="" disabled selected>Select color</option>
                            <option>Black</option>
                            <option>White</option>
                            <option>Blue</option>
                            <option>Orange</option>
                            <option>Green</option>
                        </select>

                        <label for="quantity">Quantity:</label>
                        <input id="quantity" type="number" min="1" placeholder="5" required>

                    </div>

                    <footer class="footer-modal">
                        <button type="button" class="button-modal cancel-btn">Cancel</button>
                        <button type="submit" class="button-modal submit-btn">Add Register</button>
                    </footer>
                </form>
            </dialog>
        </aside>
        
    </main>
</body>
</html>
