<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In - Incolonova</title>
    <link rel="stylesheet" href="/css/log_in.css">
    <link rel="stylesheet" href="/fonts/fonts.css">
    <link rel="icon" href="/assets/img/icon.png" type="image/png">
</head>

<body>
    <section class="sec-logo">
        <div class="div-logo">
            <img class="logo" src="/assets/img/logo-login.png" alt="Logo de Incolonova">
        </div>
    </section>
    
    <section class="sec-card">
        <div class="card__div">
            <h1>LOG IN</h1>
            <form action="">
                <div class="card__inputs">
                    <label>Username
                        <input type="text" name="username" placeholder="John Doe" required>
                    </label>
                    <label>Password
                        <input type="password" name="password" required>
                    </label>
                </div>
                <a href="" class="ask-one">Did you forget the password?</a>
                <div class="card__buttons">
                    <input class="button" type="submit" value="Log In">
                    <div class="button"><a href="">Log in with Google</a></div>
                </div>
            </form>
            <a href="" class="ask-two">Don't have an account?</a>
        </div>
    </section>
</body>
</html>
